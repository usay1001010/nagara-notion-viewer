<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAGARA Notion Architecture Viewer</title>
<style>
:root {
  --bg: #f8f9fc;
  --surface: #ffffff;
  --surface2: #f0f2f7;
  --border: #e2e5ee;
  --text: #1a1d2e;
  --text2: #6b7294;
  --accent: #5046e5;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Inter','Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif; line-height:1.6; }
.container { max-width:1480px; margin:0 auto; padding:20px 24px; }

header { text-align:center; padding:40px 20px 24px; }
header h1 { font-size:2rem; font-weight:800; color:var(--accent); }
header p { color:var(--text2); margin-top:4px; font-size:0.95rem; }

/* Tabs */
.tabs { display:flex; gap:4px; margin-bottom:24px; border-bottom:2px solid var(--border); flex-wrap:wrap; }
.tab { padding:12px 24px; cursor:pointer; border:none; background:none; color:var(--text2); font-size:0.95rem; font-weight:600; border-bottom:3px solid transparent; transition:all 0.15s; }
.tab:hover { color:var(--text); background:var(--surface2); border-radius:8px 8px 0 0; }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.tab-content { display:none; }
.tab-content.active { display:block; }

/* Layer section */
.layer-section { margin-bottom:28px; }
.layer-header { display:flex; align-items:center; gap:10px; margin-bottom:14px; padding:8px 14px; border-radius:10px; }
.layer-header h2 { font-size:1.15rem; font-weight:700; }
.layer-header .layer-badge { font-size:0.72rem; padding:2px 10px; border-radius:20px; font-weight:700; color:#fff; }
.layer-header .layer-desc { font-size:0.82rem; color:var(--text2); margin-left:auto; }

/* DB cards */
.cards-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:14px; }
.db-card {
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:12px;
  padding:16px 18px;
  cursor:pointer;
  transition:all 0.2s;
  position:relative;
  overflow:hidden;
}
.db-card:hover { border-color:#b0b8d0; box-shadow:0 2px 12px rgba(0,0,0,0.06); }
.db-card .card-top { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.db-card .db-id { font-size:0.7rem; font-weight:700; padding:2px 8px; border-radius:6px; color:#fff; flex-shrink:0; }
.db-card .db-name { font-size:0.95rem; font-weight:700; }
.db-card .db-desc { font-size:0.8rem; color:var(--text2); line-height:1.5; }
.db-card .views-row { display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; }
.db-card .view-tag { font-size:0.68rem; padding:2px 8px; border-radius:6px; background:var(--surface2); color:var(--text2); }
.db-card .view-icon { font-size:0.68rem; }

/* Expanded card */
.db-card .expanded-area { display:none; margin-top:14px; border-top:1px solid var(--border); padding-top:12px; }
.db-card.expanded .expanded-area { display:block; }
.db-card.expanded { grid-column: 1 / -1; max-width:100%; z-index:10; box-shadow:0 4px 24px rgba(0,0,0,0.1); border-color:var(--accent); }
.close-btn { position:absolute; top:12px; right:14px; background:#f1f5f9; border:1px solid var(--border); border-radius:8px; padding:4px 14px; font-size:0.78rem; cursor:pointer; color:var(--text2); font-weight:600; z-index:20; }
.close-btn:hover { background:#e2e8f0; color:var(--text); }

/* Property groups */
.prop-group { margin-bottom:12px; }
.prop-group-title { font-size:0.82rem; font-weight:700; margin-bottom:6px; padding-bottom:4px; border-bottom:1px dashed var(--border); }
.prop-row { display:flex; align-items:flex-start; gap:8px; padding:3px 0; font-size:0.78rem; flex-wrap:wrap; }
.prop-type-badge { font-size:0.65rem; padding:1px 7px; border-radius:4px; font-weight:600; flex-shrink:0; background:#f1f5f9; color:var(--text2); border:1px solid var(--border); white-space:nowrap; }
.prop-name { font-weight:600; color:var(--text); flex-shrink:0; }
.prop-detail { color:var(--text2); font-size:0.75rem; }
.prop-options { display:flex; flex-wrap:wrap; gap:3px; }
.prop-pill { font-size:0.65rem; padding:1px 7px; border-radius:10px; font-weight:500; white-space:nowrap; }
.relation-badge { font-size:0.72rem; padding:2px 10px; border-radius:8px; font-weight:600; color:#fff; cursor:default; }
.rollup-detail { font-family:'SF Mono','Consolas',monospace; font-size:0.72rem; background:#f8fafc; padding:2px 8px; border-radius:4px; border:1px solid var(--border); }

/* Canvas diagram */
.canvas-wrap { position:relative; width:100%; overflow-x:auto; }
canvas#archCanvas { display:block; margin:0 auto; }
.canvas-legend { display:flex; flex-wrap:wrap; gap:16px; justify-content:center; margin-top:16px; font-size:0.82rem; }
.canvas-legend span { display:flex; align-items:center; gap:6px; }
.canvas-legend .leg-dot { width:14px; height:14px; border-radius:4px; }

/* Stats */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:12px; margin-bottom:28px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px; text-align:center; }
.stat-card .stat-num { font-size:2rem; font-weight:800; color:var(--accent); }
.stat-card .stat-label { font-size:0.82rem; color:var(--text2); }

/* Action plan */
.phase { margin-bottom:20px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:18px 20px; }
.phase h3 { font-size:1rem; font-weight:700; margin-bottom:10px; }
.phase-item { display:flex; align-items:center; gap:8px; padding:4px 0; font-size:0.85rem; }
.phase-item .status-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.phase-item .status-dot.done { background:#22c55e; }
.phase-item .status-dot.pending { background:#e2e5ee; border:2px solid #c0c5d4; }

/* Search */
.search-box { margin-bottom:20px; }
.search-box input { width:100%; max-width:480px; padding:10px 16px; border:1.5px solid var(--border); border-radius:10px; font-size:0.95rem; outline:none; transition:border-color 0.15s; }
.search-box input:focus { border-color:var(--accent); }

/* View type icons */
.vt-table::before { content:""; }
.vt-board::before { content:""; }
.vt-calendar::before { content:""; }
.vt-timeline::before { content:""; }
.vt-gallery::before { content:""; }
.vt-form::before { content:""; }

/* Rationale tab */
.rationale-overview { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px 24px; margin-bottom:28px; line-height:1.8; }
.rationale-overview h2 { font-size:1.15rem; font-weight:700; margin-bottom:8px; color:var(--accent); }
.rationale-overview p { font-size:0.88rem; color:var(--text2); }
.rationale-section { margin-bottom:32px; }
.rationale-section > h2 { font-size:1.2rem; font-weight:700; margin-bottom:16px; padding-bottom:8px; border-bottom:2px solid var(--border); }
.rationale-category { margin-bottom:20px; background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
.rationale-category summary { padding:14px 18px; font-size:0.95rem; font-weight:700; cursor:pointer; background:var(--surface2); list-style:none; display:flex; align-items:center; gap:8px; }
.rationale-category summary::-webkit-details-marker { display:none; }
.rationale-category summary::before { content:"▶"; font-size:0.7rem; transition:transform 0.2s; }
.rationale-category[open] summary::before { transform:rotate(90deg); }
.rationale-table { width:100%; border-collapse:collapse; font-size:0.82rem; }
.rationale-table th { padding:10px 12px; text-align:left; background:var(--surface2); border-bottom:2px solid var(--border); font-weight:700; white-space:nowrap; }
.rationale-table td { padding:8px 12px; border-bottom:1px solid var(--border); vertical-align:top; }
.rationale-table tr:nth-child(even) { background:#fafbfd; }
.rationale-table .db-list { display:flex; flex-wrap:wrap; gap:3px; }
.rationale-table .db-pill { font-size:0.65rem; padding:1px 6px; border-radius:4px; color:#fff; font-weight:600; white-space:nowrap; }
.rationale-table .reason-col { font-size:0.78rem; color:var(--text); line-height:1.5; max-width:280px; }
.rationale-table .not-reason-col { font-size:0.78rem; color:var(--text2); line-height:1.5; max-width:280px; }

/* 16x16 Matrix */
.matrix-wrap { overflow-x:auto; margin-bottom:16px; }
.matrix-table { border-collapse:collapse; }
.matrix-table th, .matrix-table td { width:28px; height:28px; min-width:28px; text-align:center; font-size:0.6rem; font-weight:600; border:1px solid var(--border); padding:0; }
.matrix-table th { background:var(--surface2); position:sticky; }
.matrix-table th.corner { background:var(--surface); }
.matrix-table td.cell-exists { background:#dcfce7; cursor:pointer; }
.matrix-table td.cell-exists:hover { background:#bbf7d0; }
.matrix-table td.cell-not { background:#f9fafb; cursor:pointer; }
.matrix-table td.cell-not:hover { background:#f1f5f9; }
.matrix-table td.cell-self { background:#dbeafe; cursor:pointer; }
.matrix-table td.cell-self:hover { background:#bfdbfe; }
.matrix-table td.cell-diag { background:var(--surface2); }
.matrix-detail { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 20px; margin-top:16px; display:none; }
.matrix-detail.visible { display:block; }
.matrix-detail h4 { font-size:0.95rem; font-weight:700; margin-bottom:6px; }
.matrix-detail p { font-size:0.85rem; color:var(--text2); line-height:1.6; }
.matrix-detail .detail-badge { display:inline-block; font-size:0.72rem; padding:2px 10px; border-radius:8px; font-weight:600; color:#fff; margin-right:6px; }
</style>
</head>
<body>

<header>
  <h1>NAGARA Notion Architecture Viewer</h1>
  <p>16 DBs / 5+1 Layers / Full property & relation map</p>
</header>

  <div class="tabs">

  <div class="tab-content" id="tab-action">
    <div id="actionPlan"></div>

  <div class="tab-content" id="tab-rationale">
    <div id="rationaleContent"></div>
  </div>
</div>

// ===== HELPER =====
function getLayerColor(layerKey) { return layers[layerKey]?.color || "#888"; }
function getLayerBg(layerKey) { return layers[layerKey]?.bg || "#f5f5f5"; }
function dbById(id) { return dbs.find(d => d.id === id); }

const viewIcons = {table:"\u{1F5C2}",board:"\u{1F4CB}",calendar:"\u{1F4C5}",timeline:"\u{23F3}",gallery:"\u{1F5BC}",form:"\u{1F4DD}"};

function groupProps(props) {
  const g = {relation:[],rollup:[],select:[],multi_select:[],text:[],date:[],number:[],other:[]};
  for (const p of props) {
    if (p.t === "relation") g.relation.push(p);
    else if (p.t === "rollup") g.rollup.push(p);
    else if (p.t === "select") g.select.push(p);
    else if (p.t === "multi_select") g.multi_select.push(p);
    else if (["title","rich_text","email","phone_number","url"].includes(p.t)) g.text.push(p);
    else if (["date","created_time","last_edited_time"].includes(p.t)) g.date.push(p);
    else if (["number","unique_id"].includes(p.t)) g.number.push(p);
    else g.other.push(p);
  }
  return g;
}

function renderStats() {
  const grid = document.getElementById("statsGrid");
  const totalProps = dbs.reduce((s, d) => s + d.props.length, 0);
  const totalViews = dbs.reduce((s, d) => s + d.views.length, 0);
  const totalRels = relations.length;
  const items = [
    {n:dbs.length, l:"Databases"}, {n:totalProps, l:"Properties"}, {n:totalViews, l:"Views"}, {n:totalRels, l:"Relations"},
    {n:Object.keys(layers).length, l:"Layers"},
  ];
  grid.innerHTML = items.map(i => `<div class="stat-card"><div class="stat-num">${i.n}</div><div class="stat-label">${i.l}</div></div>`).join("");
}

function renderLayerSections(filter) {
  const container = document.getElementById("layerSections");
  const layerOrder = ["crm","general","marketing","dev","executive","form"];
  let html = "";
  for (const lk of layerOrder) {
    const ly = layers[lk];
    let layerDbs = dbs.filter(d => d.layer === lk);
    if (filter) {
      const q = filter.toLowerCase();
      layerDbs = layerDbs.filter(d =>
        d.name.toLowerCase().includes(q) || d.id.toLowerCase().includes(q) ||
        d.desc.toLowerCase().includes(q) || d.props.some(p => p.n.toLowerCase().includes(q))
      );
    }
    if (layerDbs.length === 0 && filter) continue;
    html += `<div class="layer-section">
      <div class="layer-header" style="background:${ly.bg}">
        <span class="layer-badge" style="background:${ly.color}">${ly.name}</span>
        <h2>${ly.name}</h2>
        <span class="layer-desc">${ly.desc} (${ly.count} DBs)</span>
      </div>
      <div class="cards-grid">`;
    for (const db of layerDbs) {
      html += renderCard(db, lk);
    }
    html += `</div></div>`;
  }
  container.innerHTML = html;
}

function renderCard(db, lk) {
  const color = getLayerColor(lk);
  const viewsHtml = db.views.map(v => `<span class="view-tag"><span class="view-icon">${viewIcons[v.t]||""}</span> ${v.n}</span>`).join("");
  const gp = groupProps(db.props);
  let expandedHtml = renderExpandedProps(gp, db);
  return `<div class="db-card" data-id="${db.id}" onclick="toggleCard(event, this)">
    <button class="close-btn" style="display:none" onclick="closeCard(event, this)">&#10005; 閉じる</button>
    <div class="card-top">
      <span class="db-id" style="background:${color}">${db.id}</span>
      <span class="db-name">${db.name}</span>
    </div>
    <div class="db-desc">${db.desc}</div>
    <div class="views-row">${viewsHtml}</div>
    <div class="expanded-area">${expandedHtml}</div>
  </div>`;
}

// ===== CARD EXPAND/CLOSE =====
function toggleCard(e, el) {
  // Don't toggle if clicking close button
  if (e.target.closest('.close-btn')) return;
  e.stopPropagation();
  const wasExpanded = el.classList.contains("expanded");
  // Close all
  document.querySelectorAll(".db-card.expanded").forEach(c => {
    c.classList.remove("expanded");
    c.querySelector(".close-btn").style.display = "none";
  });
  if (!wasExpanded) {
    el.classList.add("expanded");
    el.querySelector(".close-btn").style.display = "block";
    el.scrollIntoView({behavior:"smooth", block:"nearest"});
  }
}

function closeCard(e, btn) {
  e.stopPropagation();
  const card = btn.closest(".db-card");
  card.classList.remove("expanded");
  btn.style.display = "none";
}

// Close on background click
document.addEventListener("click", (e) => {
  if (!e.target.closest(".db-card")) {
    document.querySelectorAll(".db-card.expanded").forEach(c => {
      c.classList.remove("expanded");
      c.querySelector(".close-btn").style.display = "none";
    });
  }
});

// ===== CANVAS DIAGRAM =====
const nodePositions = {};
let selectedNode = null;
let canvasW = 1200, canvasH = 680;

function layoutNodes() {
  const nw = 120, nh = 48;
  const padX = 60, padY = 30;
  // Row definitions (y bands)
  const rows = [
    {y: 80, ids: ["DB1","DB2","DB3","DB7"]},       // CRM top
    {y: 180, ids: ["DB4","DB5","DB6","DB16"]},      // CRM bottom
    {y: 340, ids: ["DB8","DB9","DB10","DB11"]},     // General
    {y: 500, ids: ["DB13","DB14","DB15","DB12"]},   // Others
  ];
  for (const row of rows) {
    const count = row.ids.length;
    const totalW = count * nw + (count - 1) * padX;
    let startX = (canvasW - totalW) / 2;
    for (let i = 0; i < count; i++) {
      nodePositions[row.ids[i]] = {x: startX + i * (nw + padX), y: row.y, w: nw, h: nh};
    }
  }
}

function drawDiagram() {
  const canvas = document.getElementById("archCanvas");
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvasW * dpr;
  canvas.height = canvasH * dpr;
  canvas.style.width = canvasW + "px";
  canvas.style.height = canvasH + "px";
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, canvasW, canvasH);

  layoutNodes();

  // Draw layer bands
  const bands = [
    {y:40, h:210, layer:"crm"},
    {y:300, h:110, layer:"general"},
    {y:460, h:110, layer:"marketing"}, // shared row
  ];
  for (const b of bands) {
    ctx.fillStyle = layers[b.layer].bg;
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.roundRect(20, b.y, canvasW - 40, b.h, 12);
    ctx.fill();
    ctx.globalAlpha = 1;
    // label
    ctx.fillStyle = layers[b.layer].color;
    ctx.font = "bold 11px Inter, sans-serif";
    ctx.fillText(layers[b.layer].name, 30, b.y + 18);
  }
  // Others band (mixed)
  ctx.fillStyle = "#f9fafb";
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.roundRect(20, 460, canvasW - 40, 110, 12);
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.fillStyle = "#888";
  ctx.font = "bold 11px Inter, sans-serif";
  ctx.fillText("Marketing / Dev / Executive / Form", 30, 478);

  // Draw relations
  for (const rel of relations) {
    const from = nodePositions[rel.f];
    const to = nodePositions[rel.t];
    if (!from || !to) continue;

    const isSelf = rel.f === rel.t;
    const isHighlighted = selectedNode && (rel.f === selectedNode || rel.t === selectedNode);
    const isDimmed = selectedNode && !isHighlighted;

    // Determine line style
    const fromDb = dbById(rel.f);
    const toDb = dbById(rel.t);
    const isCrossLayer = fromDb && toDb && fromDb.layer !== toDb.layer;

    ctx.save();
    if (isDimmed) {
      ctx.globalAlpha = 0.08;
    } else if (isHighlighted) {
      ctx.lineWidth = 2.5;
      ctx.strokeStyle = getLayerColor(fromDb.layer);
      ctx.globalAlpha = 1;
    } else {
      ctx.lineWidth = 1;
      ctx.strokeStyle = "#c0c5d4";
      ctx.globalAlpha = 0.4;
    }

    if (isCrossLayer && !isHighlighted) {
      ctx.setLineDash([4, 4]);
    }

    if (isSelf) {
      // Self-reference arc
      const cx = from.x + from.w + 8;
      const cy = from.y + from.h / 2;
      ctx.beginPath();
      ctx.arc(cx, cy, 14, -Math.PI * 0.5, Math.PI * 0.5);
      ctx.stroke();
    } else {
      const fx = from.x + from.w / 2;
      const fy = from.y + from.h / 2;
      const tx = to.x + to.w / 2;
      const ty = to.y + to.h / 2;
      ctx.beginPath();
      const midY = (fy + ty) / 2;
      ctx.moveTo(fx, fy);
      ctx.bezierCurveTo(fx, midY, tx, midY, tx, ty);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Draw nodes
  for (const db of dbs) {
    const pos = nodePositions[db.id];
    if (!pos) continue;
    const color = getLayerColor(db.layer);
    const isSelected = selectedNode === db.id;
    const isDimmed = selectedNode && !isSelected && !relations.some(r => (r.f === selectedNode && r.t === db.id) || (r.t === selectedNode && r.f === db.id));

    ctx.save();
    if (isDimmed) ctx.globalAlpha = 0.2;

    // Shadow
    ctx.shadowColor = "rgba(0,0,0,0.08)";
    ctx.shadowBlur = 6;
    ctx.shadowOffsetY = 2;

    // Box
    ctx.fillStyle = "#fff";
    ctx.strokeStyle = isSelected ? color : "#d0d5e0";
    ctx.lineWidth = isSelected ? 2.5 : 1.2;
    ctx.beginPath();
    ctx.roundRect(pos.x, pos.y, pos.w, pos.h, 8);
    ctx.fill();
    ctx.stroke();

    ctx.shadowColor = "transparent";

    // ID badge
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(pos.x + 6, pos.y + 6, 36, 16, 4);
    ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.font = "bold 9px Inter, sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(db.id, pos.x + 24, pos.y + 17);

    // Name
    ctx.fillStyle = "#1a1d2e";
    ctx.font = "600 10px Inter, Hiragino Sans, sans-serif";
    ctx.textAlign = "center";
    const shortName = db.name.length > 10 ? db.name.substring(0, 10) + "..." : db.name;
    ctx.fillText(shortName, pos.x + pos.w / 2, pos.y + 38);

    ctx.restore();
  }

  // Legend
  renderCanvasLegend();
}

function renderCanvasLegend() {
  const el = document.getElementById("canvasLegend");
  let html = "";
  for (const [k, v] of Object.entries(layers)) {
    html += `<span><span class="leg-dot" style="background:${v.color}"></span>${v.name}</span>`;
  }
  el.innerHTML = html;
}

// Canvas click handler
document.getElementById("archCanvas").addEventListener("click", (e) => {
  const canvas = e.target;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  let clicked = null;
  for (const db of dbs) {
    const pos = nodePositions[db.id];
    if (!pos) continue;
    if (x >= pos.x && x <= pos.x + pos.w && y >= pos.y && y <= pos.y + pos.h) {
      clicked = db.id;
      break;
    }
  }

  if (clicked === selectedNode) {
    selectedNode = null;
  } else {
    selectedNode = clicked;
  }
  drawDiagram();
});

function renderIdealTab() {
  const c = document.getElementById("idealContent");

  // Summary cards
  const totalDb = idealStatus.length;
  const schemaOk = idealStatus.filter(d=>d.schema).length;
  const viewsOk = idealStatus.filter(d=>d.views).length;
  const tplOk = idealStatus.filter(d=>d.tpl).length;
  const dataOk = idealStatus.filter(d=>d.data).length;
  const autoOk = idealStatus.filter(d=>d.auto).length;

  let html = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:24px;">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;">
      <div style="font-size:1.8rem;font-weight:800;color:#22c55e;">${schemaOk}/${totalDb}</div>
      <div style="font-size:0.8rem;color:var(--text2);">スキーマ</div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;">
      <div style="font-size:1.8rem;font-weight:800;color:#22c55e;">${viewsOk}/${totalDb}</div>
      <div style="font-size:0.8rem;color:var(--text2);">ビュー</div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;">
      <div style="font-size:1.8rem;font-weight:800;color:${tplOk>0?'#f59e0b':'#ef4444'};">${tplOk}/${totalDb}</div>
      <div style="font-size:0.8rem;color:var(--text2);">テンプレート</div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;">
      <div style="font-size:1.8rem;font-weight:800;color:${dataOk>0?'#f59e0b':'#ef4444'};">${dataOk}/${totalDb}</div>
      <div style="font-size:0.8rem;color:var(--text2);">データ投入</div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;">
      <div style="font-size:1.8rem;font-weight:800;color:${autoOk>0?'#f59e0b':'#ef4444'};">${autoOk}/${totalDb}</div>
      <div style="font-size:0.8rem;color:var(--text2);">自動化</div>
    </div>
  </div>`;

  // Comparison table
  html += `<div style="overflow-x:auto;margin-bottom:28px;">
  <table style="width:100%;border-collapse:collapse;font-size:0.85rem;">
    <thead><tr style="background:var(--surface2);">
      <th style="padding:10px;text-align:left;border-bottom:2px solid var(--border);">DB</th>
      <th style="padding:10px;text-align:center;border-bottom:2px solid var(--border);">スキーマ</th>
      <th style="padding:10px;text-align:center;border-bottom:2px solid var(--border);">ビュー</th>
      <th style="padding:10px;text-align:center;border-bottom:2px solid var(--border);">テンプレート</th>
      <th style="padding:10px;text-align:center;border-bottom:2px solid var(--border);">データ</th>
      <th style="padding:10px;text-align:center;border-bottom:2px solid var(--border);">自動化</th>
      <th style="padding:10px;text-align:left;border-bottom:2px solid var(--border);">理想の状態</th>
    </tr></thead><tbody>`;

  const icon = v => v ? '<span style="color:#22c55e;font-weight:700;">✅</span>' : '<span style="color:#ef4444;">❌</span>';

  for (const d of idealStatus) {
    const allDone = d.schema && d.views && d.tpl && d.data && d.auto;
    const rowBg = allDone ? '#f0fdf4' : (d.missing.length<=2 ? '#fffbeb' : '');
    html += `<tr style="background:${rowBg};border-bottom:1px solid var(--border);">
      <td style="padding:10px;font-weight:700;">${d.db} ${d.n}</td>
      <td style="padding:10px;text-align:center;">${icon(d.schema)}</td>
      <td style="padding:10px;text-align:center;">${icon(d.views)}</td>
      <td style="padding:10px;text-align:center;">${icon(d.tpl)}</td>
      <td style="padding:10px;text-align:center;">${icon(d.data)}</td>
      <td style="padding:10px;text-align:center;">${icon(d.auto)}</td>
      <td style="padding:10px;font-size:0.8rem;color:var(--text2);max-width:300px;">${d.ideal}</td>
    </tr>`;
  }
  html += `</tbody></table></div>`;

  // Detailed cards per DB: what's missing
  html += `<h2 style="font-size:1.2rem;font-weight:700;margin-bottom:16px;">📋 各DBの理想状態 & 残タスク</h2>`;
  html += `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:14px;">`;

  for (const d of idealStatus) {
    const done = d.schema && d.views && d.tpl && d.data && d.auto;
    const borderColor = done ? '#22c55e' : (d.missing.length <= 2 ? '#f59e0b' : '#ef4444');
    const statusLabel = done ? '✅ 完成' : (d.missing.length <= 2 ? '⚠️ あと少し' : '🔧 構築中');

    const missingHtml = d.missing.map(m => `<li style="font-size:0.8rem;color:var(--text2);margin-bottom:4px;">⬜ ${m}</li>`).join('');

    // Find the DB's actual layer
    const dbData = dbs.find(db => db.id === d.db);
    const layerInfo = dbData ? layers[dbData.layer] : null;
    const layerBadge = layerInfo ? `<span style="font-size:0.65rem;padding:2px 8px;border-radius:10px;background:${layerInfo.bg};color:${layerInfo.color};font-weight:700;">${layerInfo.name}</span>` : '';

    html += `<div style="background:var(--surface);border:1px solid var(--border);border-left:4px solid ${borderColor};border-radius:12px;padding:16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span style="font-weight:700;">${d.db} ${d.n}</span>
        <span style="display:flex;gap:6px;align-items:center;">${layerBadge}<span style="font-size:0.75rem;color:${borderColor};font-weight:700;">${statusLabel}</span></span>
      </div>
      <div style="font-size:0.82rem;color:var(--accent);margin-bottom:8px;">🎯 ${d.ideal}</div>
      ${d.missing.length ? `<div style="margin-top:6px;"><div style="font-size:0.72rem;font-weight:700;color:var(--text2);margin-bottom:4px;">残タスク (${d.missing.length})</div><ul style="list-style:none;padding:0;">${missingHtml}</ul></div>` : '<div style="font-size:0.8rem;color:#22c55e;">すべて完了！</div>'}
    </div>`;
  }
  html += `</div>`;

  c.innerHTML = html;
}

    // === DB14 バックログ ↔ 残りDB ===
    {from:"DB14",to:"DB14",exists:false,reason:"バックログ間の直接リレーションは不要。依存関係はステータスとテキストで管理"},
    {from:"DB14",to:"DB15",exists:false,reason:"バックログと1on1は無関係"},
    {from:"DB14",to:"DB16",exists:false,reason:"バックログとCRMタスクは無関係。レイヤーが異なる（Dev vs CRM）"},

    // === DB15 1on1 ↔ 残りDB ===
    {from:"DB15",to:"DB15",exists:false,reason:"1on1間の直接リレーションは不要。時系列は日付でソート"},
    {from:"DB15",to:"DB16",exists:false,reason:"1on1とCRMタスクは無関係。レイヤーが異なる（Executive vs CRM）"},

    // === DB16 CRMタスク ↔ 残りDB ===
    {from:"DB16",to:"DB16",exists:false,reason:"CRMタスク間の直接リレーションは不要。階層化はCRMタスクでは不要（1アクション=1タスク）"},
  ];

  const dbOrder = ["DB1","DB2","DB3","DB4","DB5","DB6","DB7","DB16","DB8","DB9","DB10","DB11","DB13","DB14","DB15","DB12"];

  // Build lookup for relation rationale
  const relLookup = {};
  for (const r of relRationale) {
    const key1 = r.from + "-" + r.to;
    const key2 = r.to + "-" + r.from;
    relLookup[key1] = r;
    if (r.from !== r.to) relLookup[key2] = r;
  }

  // Also build lookup from actual relations data
  const actualRelSet = new Set();
  for (const rel of relations) {
    actualRelSet.add(rel.f + "-" + rel.t);
    if (rel.f !== rel.t) actualRelSet.add(rel.t + "-" + rel.f);
  }

  // Helper: get DB pill color
  function dbPillColor(dbId) {
    const db = dbById(dbId);
    return db ? getLayerColor(db.layer) : "#888";
  }

  function dbPills(dbIds) {
    return dbIds.map(id => `<span class="db-pill" style="background:${dbPillColor(id)}">${id}</span>`).join("");
  }

  let html = "";

  // --- Overview ---
  html += `<div class="rationale-overview">
    <h2>SSOT設計の原則</h2>
    <p><strong>Single Source of Truth（唯一の情報源）</strong> - 各情報は1箇所にのみ存在し、他のDBからはリレーション/ロールアップで参照する。</p>
    <p>このタブでは、16個のDBのプロパティとリレーションが<strong>なぜその設計になっているか</strong>を説明します。</p>
    <p style="margin-top:8px;">
      <strong>設計判断の3つの軸:</strong><br>
      1. <strong>実体が持つべきか？</strong> - 連絡先は法人/施設/個人（実体）が持ち、商談（トランザクション）は持たない<br>
      2. <strong>重複を避けられるか？</strong> - 事業所のエリアは施設からrollupで取得可能なので持たない<br>
      3. <strong>スコープを分離すべきか？</strong> - CRMタスクと社内タスクはAIエージェントの制御境界として分離
    </p>
  </div>`;

  // --- Section A: Property Rationale ---
  html += `<div class="rationale-section">
    <h2>Section A: プロパティ設計根拠（なぜあるか / なぜないか）</h2>`;

  for (const cat of propRationale) {
    html += `<details class="rationale-category" open>
      <summary>${cat.category}</summary>
      <div style="overflow-x:auto;">
        <table class="rationale-table">
          <thead><tr>
            <th style="min-width:120px;">プロパティ</th>
            <th style="min-width:140px;">あるDB</th>
            <th class="reason-col" style="min-width:200px;">ある理由</th>
            <th style="min-width:140px;">ないDB</th>
            <th class="not-reason-col" style="min-width:200px;">ない理由</th>
          </tr></thead>
          <tbody>`;
    for (const p of cat.props) {
      html += `<tr>
        <td style="font-weight:600;">${p.name}</td>
        <td><div class="db-list">${dbPills(p.has)}</div></td>
        <td class="reason-col">${p.reason}</td>
        <td><div class="db-list">${dbPills(p.hasNot)}</div></td>
        <td class="not-reason-col">${p.notReason}</td>
      </tr>`;
    }
    html += `</tbody></table></div></details>`;
  }
  html += `</div>`;

  // --- Section B: Relation Matrix ---
  html += `<div class="rationale-section">
    <h2>Section B: リレーション設計根拠（16x16 マトリクス）</h2>
    <p style="font-size:0.85rem;color:var(--text2);margin-bottom:12px;">セルをクリックすると下に根拠が表示されます。色凡例: <span style="background:#dcfce7;padding:2px 8px;border-radius:4px;font-size:0.8rem;">✅ リレーションあり</span> <span style="background:#f9fafb;border:1px solid var(--border);padding:2px 8px;border-radius:4px;font-size:0.8rem;">➖ リレーションなし</span> <span style="background:#dbeafe;padding:2px 8px;border-radius:4px;font-size:0.8rem;">🔄 自己参照</span> <span style="background:#fef2f2;border:2px solid #ef4444;padding:2px 8px;border-radius:4px;font-size:0.8rem;">⚠️ 根拠未定義（要検討）</span></p>`;

  // Health check summary
  let warningCount = 0;
  let relWithRationale = 0;
  let relWithoutRationale = 0;
  let noRelWithRationale = 0;
  for (let ri = 0; ri < dbOrder.length; ri++) {
    for (let ci = 0; ci < dbOrder.length; ci++) {
      if (ri === ci) continue;
      const key = dbOrder[ri] + "-" + dbOrder[ci];
      const hasRel = actualRelSet.has(key);
      const info = relLookup[key];
      if (hasRel && info) relWithRationale++;
      else if (hasRel && !info) { relWithoutRationale++; warningCount++; }
      else if (info && info.exists && !hasRel) noRelWithRationale++;
    }
  }
  const selfRefs = dbOrder.filter(id => actualRelSet.has(id+"-"+id)).length;

  html += `<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;">
    <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:12px 16px;flex:1;min-width:180px;">
      <div style="font-size:1.4rem;font-weight:800;color:#16a34a;">${relWithRationale}</div>
      <div style="font-size:0.78rem;color:#6b7294;">リレーションあり（根拠あり）</div>
    </div>
    <div style="background:${relWithoutRationale>0?'#fef2f2':'#f0fdf4'};border:1px solid ${relWithoutRationale>0?'#fecaca':'#bbf7d0'};border-radius:10px;padding:12px 16px;flex:1;min-width:180px;">
      <div style="font-size:1.4rem;font-weight:800;color:${relWithoutRationale>0?'#dc2626':'#16a34a'};">${relWithoutRationale}</div>
      <div style="font-size:0.78rem;color:#6b7294;">⚠️ 根拠未定義のリレーション</div>
    </div>
    <div style="background:#ecfeff;border:1px solid #a5f3fc;border-radius:10px;padding:12px 16px;flex:1;min-width:180px;">
      <div style="font-size:1.4rem;font-weight:800;color:#0891b2;">${selfRefs}</div>
      <div style="font-size:0.78rem;color:#6b7294;">🔄 自己参照</div>
    </div>
    <div style="background:${noRelWithRationale>0?'#fffbeb':'#f0fdf4'};border:1px solid ${noRelWithRationale>0?'#fde68a':'#bbf7d0'};border-radius:10px;padding:12px 16px;flex:1;min-width:180px;">
      <div style="font-size:1.4rem;font-weight:800;color:${noRelWithRationale>0?'#d97706':'#16a34a'};">${noRelWithRationale}</div>
      <div style="font-size:0.78rem;color:#6b7294;">設計上必要だが未作成</div>
    </div>
    <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:12px 16px;flex:1;min-width:180px;">
      <div style="font-size:1.4rem;font-weight:800;color:#16a34a;">${warningCount === 0 ? '✅' : '⚠️'}</div>
      <div style="font-size:0.78rem;color:#6b7294;">${warningCount === 0 ? '設計と実態が完全一致' : warningCount + '件の不整合あり'}</div>
    </div>
  </div>`;

  // Build 16x16 matrix
  html += `<div class="matrix-wrap"><table class="matrix-table"><thead><tr><th class="corner"></th>`;
  for (const id of dbOrder) {
    const db = dbById(id);
    const c = db ? getLayerColor(db.layer) : "#888";
    html += `<th style="color:${c};font-size:0.6rem;">${id.replace("DB","")}</th>`;
  }
  html += `</tr></thead><tbody>`;

  for (let ri = 0; ri < dbOrder.length; ri++) {
    const rowId = dbOrder[ri];
    const rowDb = dbById(rowId);
    const rc = rowDb ? getLayerColor(rowDb.layer) : "#888";
    html += `<tr><th style="color:${rc};font-size:0.6rem;">${rowId.replace("DB","")}</th>`;
    for (let ci = 0; ci < dbOrder.length; ci++) {
      const colId = dbOrder[ci];
      if (ri === ci) {
        // Self - check if self-reference exists
        const selfKey = rowId + "-" + rowId;
        const hasSelf = actualRelSet.has(selfKey);
        if (hasSelf) {
          const info = relLookup[selfKey];
          const tooltip = info ? info.reason : "自己参照";
          html += `<td class="cell-self" data-from="${rowId}" data-to="${colId}" title="${tooltip}">&#x1F504;</td>`;
        } else {
          html += `<td class="cell-diag">-</td>`;
        }
      } else {
        const key = rowId + "-" + colId;
        const hasRel = actualRelSet.has(key);
        const info = relLookup[key];
        if (hasRel && info) {
          html += `<td class="cell-exists" data-from="${rowId}" data-to="${colId}" title="${info.reason}">&#x2705;</td>`;
        } else if (hasRel && !info) {
          // WARNING: relation exists but no rationale defined
          html += `<td class="cell-exists" data-from="${rowId}" data-to="${colId}" title="⚠️ 根拠未定義" style="background:#fef2f2;outline:2px solid #ef4444;">&#x26A0;</td>`;
        } else if (info && info.exists === false) {
          html += `<td class="cell-not" data-from="${rowId}" data-to="${colId}" title="${info.reason}">&#x2796;</td>`;
        } else {
          html += `<td class="cell-not" data-from="${rowId}" data-to="${colId}" title="リレーションなし">&#x2796;</td>`;
        }
      }
    }
    html += `</tr>`;
  }
  html += `</tbody></table></div>`;

  // Detail panel
  html += `<div class="matrix-detail" id="matrixDetail">
    <h4 id="matrixDetailTitle"></h4>
    <p id="matrixDetailText"></p>
  </div>`;

  html += `</div>`;

  container.innerHTML = html;

  // --- Matrix click handler ---
  container.querySelectorAll(".matrix-table td[data-from]").forEach(cell => {
    cell.addEventListener("click", () => {
      const from = cell.dataset.from;
      const to = cell.dataset.to;
      const key = from + "-" + to;
      const info = relLookup[key];
      const detailEl = document.getElementById("matrixDetail");
      const titleEl = document.getElementById("matrixDetailTitle");
      const textEl = document.getElementById("matrixDetailText");

      const fromDb = dbById(from);
      const toDb = dbById(to);
      const fromName = fromDb ? fromDb.name : from;
      const toName = toDb ? toDb.name : to;
      const fromColor = fromDb ? getLayerColor(fromDb.layer) : "#888";
      const toColor = toDb ? getLayerColor(toDb.layer) : "#888";

      const hasRel = actualRelSet.has(key) || (from === to && actualRelSet.has(key));
      const statusBadge = hasRel
        ? `<span class="detail-badge" style="background:#22c55e;">リレーションあり</span>`
        : `<span class="detail-badge" style="background:#94a3b8;">リレーションなし</span>`;

      titleEl.innerHTML = `${statusBadge} <span class="detail-badge" style="background:${fromColor}">${from}</span> ${fromName} ↔ <span class="detail-badge" style="background:${toColor}">${to}</span> ${toName}`;

      if (info) {
        textEl.innerHTML = info.reason;
        // Warning if relation exists but rationale says it shouldn't, or vice versa
        if (hasRel && info.exists === false) {
          textEl.innerHTML += '<br><br><span style="background:#fef2f2;color:#dc2626;padding:4px 10px;border-radius:6px;font-weight:700;font-size:0.85rem;">⚠️ 警告: リレーションが実際に存在するが、設計上は不要と判断。削除を検討してください。</span>';
        } else if (!hasRel && info.exists === true) {
          textEl.innerHTML += '<br><br><span style="background:#fffbeb;color:#d97706;padding:4px 10px;border-radius:6px;font-weight:700;font-size:0.85rem;">⚠️ 注意: 設計上必要だが、実際のリレーションが未作成です。</span>';
        }
      } else if (hasRel) {
        textEl.innerHTML = '<span style="background:#fef2f2;color:#dc2626;padding:6px 12px;border-radius:8px;font-weight:700;">⚠️ 警告: リレーションが存在するが、設計根拠が定義されていません。このリレーションが本当に必要か検討してください。</span>';
      } else {
        textEl.textContent = "リレーションなし（設計上も不要）";
      }

      detailEl.classList.add("visible");
      detailEl.scrollIntoView({behavior:"smooth", block:"nearest"});
    });
  });
}

// ===== INIT =====
renderStats();
renderLayerSections("");
renderIdealTab();
renderActionPlan();
renderRationale();
</script>
</body>
</html>
