<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAGARA Notion Architecture Viewer</title>
<style>
:root {
  --bg: #f8f9fc;
  --surface: #ffffff;
  --surface2: #f0f2f7;
  --border: #e2e5ee;
  --text: #1a1d2e;
  --text2: #6b7294;
  --accent: #5046e5;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Inter','Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif; line-height:1.6; }
.container { max-width:1480px; margin:0 auto; padding:20px 24px; }

header { text-align:center; padding:40px 20px 24px; }
header h1 { font-size:2rem; font-weight:800; color:var(--accent); }
header p { color:var(--text2); margin-top:4px; font-size:0.95rem; }

/* Tabs */
.tabs { display:flex; gap:4px; margin-bottom:24px; border-bottom:2px solid var(--border); flex-wrap:wrap; }
.tab { padding:12px 24px; cursor:pointer; border:none; background:none; color:var(--text2); font-size:0.95rem; font-weight:600; border-bottom:3px solid transparent; transition:all 0.15s; }
.tab:hover { color:var(--text); background:var(--surface2); border-radius:8px 8px 0 0; }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.tab-content { display:none; }
.tab-content.active { display:block; }

/* Layer section */
.layer-section { margin-bottom:28px; }
.layer-header { display:flex; align-items:center; gap:10px; margin-bottom:14px; padding:8px 14px; border-radius:10px; }
.layer-header h2 { font-size:1.15rem; font-weight:700; }
.layer-header .layer-badge { font-size:0.72rem; padding:2px 10px; border-radius:20px; font-weight:700; color:#fff; }
.layer-header .layer-desc { font-size:0.82rem; color:var(--text2); margin-left:auto; }

/* DB cards */
.cards-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:14px; }
.db-card {
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:12px;
  padding:16px 18px;
  cursor:pointer;
  transition:all 0.2s;
  position:relative;
  overflow:hidden;
}
.db-card:hover { border-color:#b0b8d0; box-shadow:0 2px 12px rgba(0,0,0,0.06); }
.db-card .card-top { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.db-card .db-id { font-size:0.7rem; font-weight:700; padding:2px 8px; border-radius:6px; color:#fff; flex-shrink:0; }
.db-card .db-name { font-size:0.95rem; font-weight:700; }
.db-card .db-desc { font-size:0.8rem; color:var(--text2); line-height:1.5; }
.db-card .prop-count { font-size:0.72rem; color:var(--text2); margin-top:6px; }

/* Expanded card */
.db-card .expanded-area { display:none; margin-top:14px; border-top:1px solid var(--border); padding-top:12px; }
.db-card.expanded .expanded-area { display:block; }
.db-card.expanded { grid-column: 1 / -1; max-width:100%; z-index:10; box-shadow:0 4px 24px rgba(0,0,0,0.1); border-color:var(--accent); }
.close-btn { position:absolute; top:12px; right:14px; background:#f1f5f9; border:1px solid var(--border); border-radius:8px; padding:4px 14px; font-size:0.78rem; cursor:pointer; color:var(--text2); font-weight:600; z-index:20; }
.close-btn:hover { background:#e2e8f0; color:var(--text); }

/* Property groups */
.prop-group { margin-bottom:12px; }
.prop-group-title { font-size:0.82rem; font-weight:700; margin-bottom:6px; padding-bottom:4px; border-bottom:1px dashed var(--border); }
.prop-row { display:flex; align-items:flex-start; gap:8px; padding:3px 0; font-size:0.78rem; flex-wrap:wrap; }
.prop-type-badge { font-size:0.65rem; padding:1px 7px; border-radius:4px; font-weight:600; flex-shrink:0; background:#f1f5f9; color:var(--text2); border:1px solid var(--border); white-space:nowrap; }
.prop-name { font-weight:600; color:var(--text); flex-shrink:0; }
.prop-detail { color:var(--text2); font-size:0.75rem; }
.prop-options { display:flex; flex-wrap:wrap; gap:3px; }
.prop-pill { font-size:0.65rem; padding:1px 7px; border-radius:10px; font-weight:500; white-space:nowrap; }
.relation-badge { font-size:0.72rem; padding:2px 10px; border-radius:8px; font-weight:600; color:#fff; cursor:default; }
.rollup-detail { font-family:'SF Mono','Consolas',monospace; font-size:0.72rem; background:#f8fafc; padding:2px 8px; border-radius:4px; border:1px solid var(--border); }

/* Canvas diagram */
.canvas-wrap { position:relative; width:100%; overflow-x:auto; }
canvas#archCanvas { display:block; margin:0 auto; }
.canvas-legend { display:flex; flex-wrap:wrap; gap:16px; justify-content:center; margin-top:16px; font-size:0.82rem; }
.canvas-legend span { display:flex; align-items:center; gap:6px; }
.canvas-legend .leg-dot { width:14px; height:14px; border-radius:4px; }

/* Stats */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:12px; margin-bottom:28px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px; text-align:center; }
.stat-card .stat-num { font-size:2rem; font-weight:800; color:var(--accent); }
.stat-card .stat-label { font-size:0.82rem; color:var(--text2); }

/* Action plan */
.phase { margin-bottom:20px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:18px 20px; }
.phase h3 { font-size:1rem; font-weight:700; margin-bottom:10px; }
.phase-item { display:flex; align-items:center; gap:8px; padding:4px 0; font-size:0.85rem; }
.phase-item .status-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.phase-item .status-dot.done { background:#22c55e; }
.phase-item .status-dot.pending { background:#e2e5ee; border:2px solid #c0c5d4; }

/* Search */
.search-box { margin-bottom:20px; }
.search-box input { width:100%; max-width:480px; padding:10px 16px; border:1.5px solid var(--border); border-radius:10px; font-size:0.95rem; outline:none; transition:border-color 0.15s; }
.search-box input:focus { border-color:var(--accent); }

/* Rationale tab */
.rationale-overview { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px 24px; margin-bottom:28px; line-height:1.8; }
.rationale-overview h2 { font-size:1.15rem; font-weight:700; margin-bottom:8px; color:var(--accent); }
.rationale-overview p { font-size:0.88rem; color:var(--text2); }
.rationale-section { margin-bottom:32px; }
.rationale-section > h2 { font-size:1.2rem; font-weight:700; margin-bottom:16px; padding-bottom:8px; border-bottom:2px solid var(--border); }

/* 25×25 matrix */
.matrix-scroll { overflow-x:auto; overflow-y:auto; max-height:700px; border:1px solid var(--border); border-radius:10px; }
.matrix-table { border-collapse:collapse; font-size:0.7rem; }
.matrix-table th, .matrix-table td { border:1px solid var(--border); }
.matrix-corner { min-width:90px; width:90px; background:var(--surface2); position:sticky; left:0; top:0; z-index:30; font-size:0.65rem; padding:4px 6px; }
.matrix-col-header { min-width:32px; width:32px; max-width:32px; background:var(--surface2); position:sticky; top:0; z-index:20; text-align:center; padding:4px 2px; font-weight:700; cursor:default; white-space:nowrap; }
.matrix-row-header { min-width:90px; width:90px; max-width:90px; background:var(--surface2); position:sticky; left:0; z-index:10; padding:3px 6px; font-weight:700; font-size:0.68rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.matrix-cell { width:32px; min-width:32px; max-width:32px; height:28px; text-align:center; cursor:pointer; font-size:0.8rem; transition:background 0.1s; }
.matrix-cell:hover { outline:2px solid var(--accent); outline-offset:-2px; }
.matrix-cell.has-rel { background:#f0fdf4; }
.matrix-cell.no-rel { background:#fafbfd; }
.matrix-cell.self-ref { background:#eff6ff; }
.matrix-cell.warn-rel { outline:2px solid #ef4444; outline-offset:-2px; }
.matrix-health { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px; margin-bottom:20px; }
.matrix-health-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px; text-align:center; }
.matrix-health-card .mhc-num { font-size:1.8rem; font-weight:800; }
.matrix-health-card .mhc-label { font-size:0.78rem; color:var(--text2); margin-top:2px; }
.matrix-detail { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:18px; margin-top:18px; min-height:80px; }
.matrix-detail .md-status { font-size:1.1rem; margin-right:8px; }
.matrix-detail .md-badge { font-size:0.75rem; font-weight:700; padding:3px 10px; border-radius:20px; color:#fff; margin-right:6px; display:inline-block; }
.matrix-detail .md-reason { margin-top:10px; font-size:0.85rem; color:var(--text2); line-height:1.7; }

/* Issues */
.issue-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:12px; }
.issue-card.sev-critical { border-left:4px solid #ef4444; }
.issue-card.sev-high { border-left:4px solid #f59e0b; }
.issue-card.sev-medium { border-left:4px solid #eab308; }
.issue-card.sev-low { border-left:4px solid #94a3b8; }
.sev-badge { font-size:0.65rem; padding:2px 8px; border-radius:4px; font-weight:700; color:#fff; display:inline-block; }
.sev-badge.sev-critical { background:#ef4444; }
.sev-badge.sev-high { background:#f59e0b; }
.sev-badge.sev-medium { background:#eab308; }
.sev-badge.sev-low { background:#94a3b8; }
.status-badge { font-size:0.65rem; padding:2px 8px; border-radius:4px; font-weight:700; color:#fff; display:inline-block; }
.status-badge.st-pending { background:#94a3b8; }
.status-badge.st-workaround { background:#f59e0b; }
.status-badge.st-done { background:#22c55e; }
.issue-deps { display:flex; gap:4px; flex-wrap:wrap; margin-top:6px; }
.issue-dep { font-size:0.7rem; padding:2px 6px; border-radius:4px; background:var(--surface2); color:var(--text2); cursor:pointer; text-decoration:none; }
.issue-dep:hover { background:var(--border); }
.issue-db-pill { font-size:0.65rem; padding:1px 6px; border-radius:4px; color:#fff; font-weight:600; display:inline-block; margin:1px; }
.issues-category-section { margin-bottom:28px; }
.issues-category-section h3 { font-size:1.05rem; font-weight:700; margin-bottom:12px; padding-bottom:6px; border-bottom:2px solid var(--border); }
.critical-path-box { background:linear-gradient(135deg, #fef2f2, #fff7ed); border:2px solid #fecaca; border-radius:12px; padding:20px; margin-bottom:28px; }
.critical-path-box h3 { font-size:1rem; font-weight:700; color:#dc2626; margin-bottom:12px; }
.critical-path-chain { display:flex; align-items:center; flex-wrap:wrap; gap:6px; font-size:0.82rem; }
.critical-path-node { background:#fff; border:2px solid #ef4444; border-radius:8px; padding:4px 10px; font-weight:600; font-size:0.78rem; }
.critical-path-arrow { color:#ef4444; font-weight:700; }

/* Hub tab */
.hub-channel { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:16px; }
.hub-channel-header { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.hub-channel-icon { font-size:1.8rem; }
.hub-channel-name { font-size:1.1rem; font-weight:700; }
.hub-diff { font-size:0.7rem; padding:3px 10px; border-radius:20px; font-weight:700; color:#fff; }
.hub-diff-easy { background:#22c55e; }
.hub-diff-medium { background:#f59e0b; }
.hub-diff-hard { background:#ef4444; }
.hub-flow { list-style:none; padding:0; }
.hub-flow li { padding:6px 0 6px 24px; position:relative; font-size:0.85rem; color:var(--text2); border-left:2px solid var(--border); margin-left:8px; }
.hub-flow li::before { content:''; position:absolute; left:-5px; top:12px; width:8px; height:8px; border-radius:50%; background:var(--accent); }
.hub-section-title { font-size:0.75rem; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:0.5px; margin:12px 0 6px; }
.hub-props { display:flex; flex-wrap:wrap; gap:4px; }
.hub-prop { font-size:0.72rem; padding:2px 8px; border-radius:4px; background:var(--surface2); color:var(--text2); }
.hub-blocker { font-size:0.8rem; color:#ef4444; padding:4px 0; }
.hub-callout { background:linear-gradient(135deg, #eef2ff, #ecfeff); border:2px solid var(--accent); border-radius:12px; padding:20px; margin-bottom:28px; }
.hub-callout h3 { font-size:1rem; font-weight:700; color:var(--accent); margin-bottom:10px; }
.hub-callout li { font-size:0.88rem; color:var(--text2); line-height:1.8; }
.hub-prop-table { width:100%; border-collapse:collapse; font-size:0.82rem; margin-bottom:28px; }
.hub-prop-table th { padding:10px 12px; text-align:left; background:var(--surface2); border-bottom:2px solid var(--border); font-weight:700; white-space:nowrap; }
.hub-prop-table td { padding:8px 12px; border-bottom:1px solid var(--border); vertical-align:top; }
.hub-prop-table tr:nth-child(even) { background:#fafbfd; }
.hub-group-row td { background:var(--surface2) !important; font-weight:700; color:var(--accent); }
.hub-notion-ai { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:28px; }
.hub-notion-ai h3 { font-size:1.05rem; font-weight:700; margin-bottom:12px; }
.hub-notion-ai li { font-size:0.88rem; color:var(--text2); line-height:1.8; padding:4px 0; }
.hub-notion-ai code { background:var(--surface2); padding:2px 6px; border-radius:4px; font-size:0.82rem; }
.hub-roadmap { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:28px; }
.hub-roadmap h3 { font-size:1.05rem; font-weight:700; margin-bottom:12px; }
.hub-roadmap-item { display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid var(--border); font-size:0.88rem; }
.hub-roadmap-item:last-child { border-bottom:none; }
.hub-roadmap-week { font-weight:700; color:var(--accent); min-width:70px; }
.hub-roadmap-desc { color:var(--text); }
.hub-roadmap-note { color:var(--text2); font-size:0.78rem; margin-left:auto; }
.hub-page-content li { font-size:0.82rem; color:var(--text2); line-height:1.6; }
.hub-notion-role { font-size:0.82rem; color:var(--text2); padding:4px 0; font-style:italic; }
</style>
</head>
<body>

<header>
  <h1>NAGARA Notion Architecture Viewer</h1>
  <p>25 DBs / 7 Layers / Full property &amp; relation map</p>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab active" data-tab="overview">現状のDB構成</button>
    <button class="tab" data-tab="ideal">理想のDB構成</button>
    <button class="tab" data-tab="diagram">リレーション図</button>
    <button class="tab" data-tab="action">アクションプラン</button>
    <button class="tab" data-tab="rationale">設計根拠</button>
    <button class="tab" data-tab="issues">課題一覧</button>
    <button class="tab" data-tab="hub">統合ハブ構想</button>
  </div>

  <div class="tab-content active" id="tab-overview">
    <div class="stats-grid" id="statsGrid"></div>
    <div class="search-box"><input type="text" id="searchInput" placeholder="DB名・プロパティ名で検索..."></div>
    <div id="layerSections"></div>
  </div>

  <div class="tab-content" id="tab-ideal">
    <div id="idealContent"></div>
  </div>

  <div class="tab-content" id="tab-diagram">
    <div class="canvas-wrap">
      <canvas id="archCanvas" width="1400" height="640"></canvas>
    </div>
    <div class="canvas-legend" id="canvasLegend"></div>
    <p style="text-align:center;margin-top:8px;font-size:0.8rem;color:var(--text2);">ノードをクリックするとリレーションをハイライト。背景クリックでリセット</p>
  </div>

  <div class="tab-content" id="tab-action">
    <div id="actionPlan"></div>
  </div>

  <div class="tab-content" id="tab-rationale">
    <div id="rationaleContent"></div>
  </div>

  <div class="tab-content" id="tab-issues">
    <div id="issuesContent"></div>
  </div>

  <div class="tab-content" id="tab-hub">
    <div id="hubContent"></div>
  </div>
</div>

<script>
// ===== DATA =====
const layers = {
  ssot:      {name:"SSOT基盤",    color:"#7c3aed", bg:"#f5f3ff", count:5, desc:"全社共通マスタ"},
  crm:       {name:"CRM・営業",   color:"#2563eb", bg:"#eff6ff", count:5, desc:"営業パイプライン"},
  hr:        {name:"人事・採用",   color:"#059669", bg:"#ecfdf5", count:4, desc:"採用管理 Closed"},
  ir:        {name:"投資家関係",   color:"#dc2626", bg:"#fef2f2", count:4, desc:"投資家管理 Closed"},
  corporate: {name:"コーポレート", color:"#f59e0b", bg:"#fffbeb", count:1, desc:"マーケティング"},
  general:   {name:"General",     color:"#0ea5e9", bg:"#ecfeff", count:5, desc:"社内運営"},
  executive: {name:"Executive",   color:"#ec4899", bg:"#fdf2f8", count:1, desc:"経営層 Closed"},
};

const dbs = [
  // SSOT基盤
  {id:"DB1",name:"法人（Accounts）",layer:"ssot",desc:"法人管理の最上位。施設/事業所/支店/人の全起点",
   props:[
     {n:"法人名",t:"title"},{n:"法人コード",t:"unique_id",x:"ACC"},
     {n:"営業ステータス（記録）",t:"select",o:["未接触","アプローチ中","商談中","関係継続中","契約法人","見送り","一時中断"]},
     {n:"組織区分",t:"select",o:["社会福祉法人","医療法人","株式会社","合同会社","NPO法人","行政","社団法人","その他"]},

     {n:"Generalタスク",t:"relation",to:"DB22"},{n:"IRタスク",t:"relation",to:"DB18"},
     {n:"紹介元（法人）",t:"relation",to:"DB1"},{n:"紹介元（支店）",t:"relation",to:"DB5"},
     {n:"紹介元（個人）",t:"relation",to:"DB4"},
     {n:"施設数",t:"rollup",rp:"施設一覧",tp:"施設名",fn:"count"},
     {n:"事業所数",t:"rollup",rp:"事業所一覧",tp:"事業所名",fn:"count"},
   ]},
  {id:"DB2",name:"施設（Facilities）",layer:"ssot",desc:"法人配下の施設。営業ステータス・エリア追跡",
   props:[
     {n:"施設名",t:"title"},{n:"施設コード",t:"unique_id",x:"FAC"},
     {n:"営業ステータス（記録）",t:"select",o:["未接触","アプローチ中","日程調整中","アポ取得","商談済み","契約施設"]},
     {n:"エリア（都道府県）",t:"select",o:["47都道府県"]},
     {n:"上位法人",t:"relation",to:"DB1"},{n:"事業所一覧",t:"relation",to:"DB3"},
     {n:"所属メンバー",t:"relation",to:"DB4"},
     {n:"紹介元（法人）",t:"relation",to:"DB1"},{n:"紹介元（支店）",t:"relation",to:"DB5"},{n:"紹介元（個人）",t:"relation",to:"DB4"},
   ]},
  {id:"DB3",name:"事業所（Offices）",layer:"ssot",desc:"介護事業所。サービス種別・導入ステータス・定員管理",
   props:[
     {n:"事業所名",t:"title"},{n:"事業所コード",t:"unique_id",x:"OFF"},
     {n:"サービス種別",t:"select",o:["居宅介護支援","訪問介護","通所介護","特養","グループホーム","他"]},
     {n:"導入ステータス",t:"select",o:["未導入","トライアル見込み","準備中","トライアル中","契約中"]},
     {n:"所属法人",t:"relation",to:"DB1"},{n:"所属施設",t:"relation",to:"DB2"},
     {n:"名刺一覧",t:"relation",to:"DB4"},{n:"契約一覧",t:"relation",to:"DB8"},{n:"プロダクト",t:"relation",to:"DB24"},

// ===== HELPER =====
function getLayerColor(layerKey) { return layers[layerKey]?.color || "#888"; }
function getLayerBg(layerKey) { return layers[layerKey]?.bg || "#f5f5f5"; }
function dbById(id) { return dbs.find(d => d.id === id); }

function groupProps(props) {
  const g = {relation:[],rollup:[],select:[],multi_select:[],text:[],date:[],number:[],other:[]};
  for (const p of props) {
    if (p.t === "relation") g.relation.push(p);
    else if (p.t === "rollup") g.rollup.push(p);
    else if (p.t === "select") g.select.push(p);
    else if (p.t === "multi_select") g.multi_select.push(p);
    else if (["title","rich_text","email","phone_number","url"].includes(p.t)) g.text.push(p);
    else if (["date","created_time","last_edited_time"].includes(p.t)) g.date.push(p);
    else if (["number","unique_id"].includes(p.t)) g.number.push(p);
    else g.other.push(p);
  }
  return g;
}

function renderStats() {

  const items = [
    {n:dbs.length, l:"Databases"}, {n:totalProps, l:"Properties"}, {n:totalRels, l:"Relations"},
    {n:Object.keys(layers).length, l:"Layers"},
  ];
  grid.innerHTML = items.map(i => `<div class="stat-card"><div class="stat-num">${i.n}</div><div class="stat-label">${i.l}</div></div>`).join("");

function renderLayerSections(filter) {
  const container = document.getElementById("layerSections");
  const layerOrder = ["ssot","crm","hr","ir","corporate","general","executive"];
  let html = "";
  for (const lk of layerOrder) {
    const ly = layers[lk];
    let layerDbs = dbs.filter(d => d.layer === lk);
    if (filter) {
      const q = filter.toLowerCase();
      layerDbs = layerDbs.filter(d =>
        d.name.toLowerCase().includes(q) || d.id.toLowerCase().includes(q) ||
        d.desc.toLowerCase().includes(q) || d.props.some(p => p.n.toLowerCase().includes(q))
      );
    }
    if (layerDbs.length === 0 && filter) continue;
    html += `<div class="layer-section">
      <div class="layer-header" style="background:${ly.bg}">
        <span class="layer-badge" style="background:${ly.color}">${ly.name}</span>
        <h2>${ly.name}</h2>
        <span class="layer-desc">${ly.desc} (${ly.count} DBs)</span>
      </div>
      <div class="cards-grid">`;
    for (const db of layerDbs) {
      html += renderCard(db, lk);
    }
    html += `</div></div>`;
  }
  container.innerHTML = html;
}

function renderCard(db, lk) {
  const color = getLayerColor(lk);
  const gp = groupProps(db.props);
  let expandedHtml = renderExpandedProps(gp, db);
  return `<div class="db-card" data-id="${db.id}" onclick="toggleCard(event, this)">
    <button class="close-btn" style="display:none" onclick="closeCard(event, this)">&#10005; 閉じる</button>
    <div class="card-top">
      <span class="db-id" style="background:${color}">${db.id}</span>
      <span class="db-name">${db.name}</span>
    </div>
    <div class="db-desc">${db.desc}</div>
    <div class="prop-count">${db.props.length} properties / ${gp.relation.length} relations</div>
    <div class="expanded-area">${expandedHtml}</div>

}

// ===== CARD EXPAND/CLOSE =====
function toggleCard(e, el) {
  if (e.target.closest('.close-btn')) return;
  e.stopPropagation();
  const wasExpanded = el.classList.contains("expanded");
  document.querySelectorAll(".db-card.expanded").forEach(c => {
    c.classList.remove("expanded");
    c.querySelector(".close-btn").style.display = "none";
  });
  if (!wasExpanded) {
    el.classList.add("expanded");
    el.querySelector(".close-btn").style.display = "block";
    el.scrollIntoView({behavior:"smooth", block:"nearest"});
  }
}

function closeCard(e, btn) {
  e.stopPropagation();
  const card = btn.closest(".db-card");
  card.classList.remove("expanded");
  btn.style.display = "none";
}

document.addEventListener("click", (e) => {
  if (!e.target.closest(".db-card")) {
    document.querySelectorAll(".db-card.expanded").forEach(c => {
      c.classList.remove("expanded");
      c.querySelector(".close-btn").style.display = "none";
    });
  }
});

// ===== CANVAS DIAGRAM =====
const nodePositions = {};
let selectedNode = null;
const canvasW = 1400, canvasH = 640;

function layoutNodes() {
  const nw = 110, nh = 46;
  const padX = 20;

  // Row 1: SSOT (DB1-5) y=60
  const row1 = ["DB1","DB2","DB3","DB4","DB5"];
  const row1Total = row1.length * nw + (row1.length - 1) * padX;
  let r1s = (canvasW - row1Total) / 2;
  row1.forEach((id, i) => { nodePositions[id] = {x: r1s + i*(nw+padX), y:60, w:nw, h:nh}; });

  // Row 2: CRM (DB6-10) y=180
  const row2 = ["DB6","DB7","DB8","DB9","DB10"];
  const row2Total = row2.length * nw + (row2.length - 1) * padX;
  let r2s = (canvasW - row2Total) / 2;
  row2.forEach((id, i) => { nodePositions[id] = {x: r2s + i*(nw+padX), y:180, w:nw, h:nh}; });

  // Row 3: HR (DB11-14) | IR (DB15-18) y=320
  const row3a = ["DB11","DB12","DB13","DB14"];
  const row3b = ["DB15","DB16","DB17","DB18"];
  const gap3 = 60;
  const r3aTotal = row3a.length * nw + (row3a.length-1)*padX;
  const r3bTotal = row3b.length * nw + (row3b.length-1)*padX;
  let r3s = (canvasW - (r3aTotal + gap3 + r3bTotal)) / 2;
  row3a.forEach((id, i) => { nodePositions[id] = {x: r3s + i*(nw+padX), y:320, w:nw, h:nh}; });
  let r3bs = r3s + r3aTotal + gap3;
  row3b.forEach((id, i) => { nodePositions[id] = {x: r3bs + i*(nw+padX), y:320, w:nw, h:nh}; });

  // Row 4: Corp(DB19) | General(DB20-24) | Exec(DB25) y=460
  const row4b = ["DB20","DB21","DB22","DB23","DB24"];
  const r4bTotal = row4b.length * nw + (row4b.length-1)*padX;
  const gap4 = 40;
  const r4fullTotal = nw + gap4 + r4bTotal + gap4 + nw;
  let r4s = (canvasW - r4fullTotal) / 2;
  nodePositions["DB19"] = {x: r4s, y:460, w:nw, h:nh};
  let r4bs = r4s + nw + gap4;
  row4b.forEach((id, i) => { nodePositions[id] = {x: r4bs + i*(nw+padX), y:460, w:nw, h:nh}; });
  nodePositions["DB25"] = {x: r4bs + r4bTotal + gap4, y:460, w:nw, h:nh};
}

function drawDiagram() {
  const canvas = document.getElementById("archCanvas");
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvasW * dpr;
  canvas.height = canvasH * dpr;
  canvas.style.width = canvasW + "px";
  canvas.style.height = canvasH + "px";
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, canvasW, canvasH);

  layoutNodes();

  // Draw layer bands
  const bands = [
    {y:36, h:86, layer:"ssot",      label:"SSOT基盤 (DB1-5)"},
    {y:155, h:86, layer:"crm",      label:"CRM・営業 (DB6-10)"},
    {y:290, h:98, layer:"hr",       label:"人事(DB11-14) / 投資家(DB15-18)"},
    {y:430, h:98, layer:"general",  label:"コーポレート(DB19) / General(DB20-24) / Executive(DB25)"},
  ];
  for (const b of bands) {
    const lyr = layers[b.layer] || {bg:"#f5f5f5", color:"#888"};
    ctx.fillStyle = lyr.bg;
    ctx.globalAlpha = 0.55;
    ctx.beginPath();
    ctx.roundRect(16, b.y, canvasW - 32, b.h, 10);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = lyr.color;
    ctx.font = "bold 11px Inter, sans-serif";
    ctx.textAlign = "left";
    ctx.fillText(b.label, 26, b.y + 16);
  }

  // Draw relations
  for (const rel of relations) {
    const from = nodePositions[rel.f];
    const to = nodePositions[rel.t];
    if (!from || !to) continue;

    const isSelf = rel.f === rel.t;
    const isHighlighted = selectedNode && (rel.f === selectedNode || rel.t === selectedNode);
    const isDimmed = selectedNode && !isHighlighted;

    const fromDb = dbById(rel.f);
    const toDb = dbById(rel.t);
    const isCrossLayer = fromDb && toDb && fromDb.layer !== toDb.layer;

    ctx.save();
    if (isDimmed) {
      ctx.globalAlpha = 0.07;
    } else if (isHighlighted) {
      ctx.lineWidth = 2.5;
      ctx.strokeStyle = getLayerColor(fromDb.layer);
      ctx.globalAlpha = 1;
    } else {
      ctx.lineWidth = 1;
      ctx.strokeStyle = "#c0c5d4";
      ctx.globalAlpha = 0.4;
    }

    if (isCrossLayer && !isHighlighted) {
      ctx.setLineDash([4, 4]);
    }

    if (isSelf) {
      const cx = from.x + from.w + 8;
      const cy = from.y + from.h / 2;
      ctx.beginPath();
      ctx.arc(cx, cy, 13, -Math.PI * 0.5, Math.PI * 0.5);
      ctx.stroke();
    } else {
      const fx = from.x + from.w / 2;
      const fy = from.y + from.h / 2;
      const tx = to.x + to.w / 2;
      const ty = to.y + to.h / 2;
      const midY = (fy + ty) / 2;
      ctx.beginPath();
      ctx.moveTo(fx, fy);
      ctx.bezierCurveTo(fx, midY, tx, midY, tx, ty);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Draw nodes
  for (const db of dbs) {
    const pos = nodePositions[db.id];
    if (!pos) continue;
    const color = getLayerColor(db.layer);
    const isSelected = selectedNode === db.id;
    const isDimmed = selectedNode && !isSelected && !relations.some(r => (r.f === selectedNode && r.t === db.id) || (r.t === selectedNode && r.f === db.id));

    ctx.save();
    if (isDimmed) ctx.globalAlpha = 0.2;

    ctx.shadowColor = "rgba(0,0,0,0.08)";
    ctx.shadowBlur = 6;
    ctx.shadowOffsetY = 2;
    ctx.fillStyle = "#fff";
    ctx.strokeStyle = isSelected ? color : "#d0d5e0";
    ctx.lineWidth = isSelected ? 2.5 : 1.2;
    ctx.beginPath();
    ctx.roundRect(pos.x, pos.y, pos.w, pos.h, 8);
    ctx.fill();
    ctx.stroke();
    ctx.shadowColor = "transparent";

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(pos.x + 4, pos.y + 4, 34, 15, 4);
    ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.font = "bold 8px Inter, sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(db.id, pos.x + 21, pos.y + 14);

    ctx.fillStyle = "#1a1d2e";
    ctx.font = "600 8.5px Inter, Hiragino Sans, sans-serif";
    ctx.textAlign = "center";
    const shortName = db.name.length > 13 ? db.name.substring(0, 13) + ".." : db.name;
    ctx.fillText(shortName, pos.x + pos.w / 2, pos.y + 36);

    ctx.restore();
  }

  renderCanvasLegend();
}

function renderCanvasLegend() {
  const el = document.getElementById("canvasLegend");
  let html = "";
  for (const [k, v] of Object.entries(layers)) {
    html += `<span><span class="leg-dot" style="background:${v.color}"></span>${v.name}</span>`;
  }
  el.innerHTML = html;
}

document.getElementById("archCanvas").addEventListener("click", (e) => {
  const canvas = e.target;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvasW / rect.width;
  const scaleY = canvasH / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;

  let clicked = null;
  for (const db of dbs) {
    const pos = nodePositions[db.id];
    if (!pos) continue;
    if (x >= pos.x && x <= pos.x + pos.w && y >= pos.y && y <= pos.y + pos.h) {
      clicked = db.id;
      break;
    }
  }
  selectedNode = clicked === selectedNode ? null : clicked;
  drawDiagram();
});

  html += `</div>`;
  c.innerHTML = html;

  relRationale["DB21-DB22"] = {exists:true,  reason:"PJ→タスクの1:N。PJを構成するタスクを管理。プロジェクト管理の中核リレーション。"};
  relRationale["DB21-DB23"] = {exists:true,  reason:"PJ→ドキュメントの1:N。PJに紐づく仕様書・設計書・議事録を一覧表示。"};
  relRationale["DB21-DB24"] = {exists:false, reason:"PJとプロダクトに直接の関係はない（#27削除）。プロダクトはドキュメント(DB23)経由でPJに間接参照。"};
  relRationale["DB22-DB23"] = {exists:true,  reason:"タスク→ドキュメントのリレーション（#21追加）。タスクの成果物・参考資料を直接ドキュメントに紐づけ。"};
  relRationale["DB22-DB24"] = {exists:false, reason:"タスクとプロダクトに直接の関係はない。プロダクト関連タスクは PJ(DB21)経由で管理。"};
  relRationale["DB23-DB24"] = {exists:true,  reason:"ドキュメント→プロダクトのリレーション（#23追加）。プロダクト仕様書・ロードマップドキュメントをプロダクトに紐づけ。"};

  // -- General → Executive --
  relRationale["DB20-DB25"] = {exists:true,  reason:"1on1の部門参照は DB25→DB20 で管理済み（双方向）。部門ページから配下メンバーの1on1を一覧表示可能。"};
  relRationale["DB21-DB25"] = {exists:false, reason:"PJと1on1に直接の関係はない。"};
  relRationale["DB22-DB25"] = {exists:false, reason:"タスクと1on1に直接の関係はない。DB25↔DB22 リレーションは削除済み（#22）。"};
  relRationale["DB23-DB25"] = {exists:false, reason:"ドキュメントと1on1に直接の関係はない。"};
  relRationale["DB24-DB25"] = {exists:false, reason:"プロダクトと1on1に直接の関係はない。"};

  // -- Executive self (already done above) --

  // Verify and build the matrix
  // Helper to get key in canonical form (smaller index first, or same for self-ref)
  function matrixKey(f, t) {
    const fi = dbOrder.indexOf(f);
    const ti = dbOrder.indexOf(t);
    if (fi === ti) return f + "-" + t;
    if (fi < ti) return f + "-" + t;
    return t + "-" + f;
  }

  // Count health stats
  let countWithRationale = 0;
  let countWithoutRationale = 0;
  let countSelfRef = 0;
  let totalRel = 0;

  // Build set of all actual relation pairs (both directions for display)
  const relSet = new Set();
  for (const r of relations) { relSet.add(r.f + "→" + r.t); }

  // Count for health
  for (let i = 0; i < dbOrder.length; i++) {
    for (let j = i; j < dbOrder.length; j++) {
      const f = dbOrder[i], t = dbOrder[j];
      const key = f + "-" + t;
      const isSelf = (f === t);
      const hasRelFT = relSet.has(f + "→" + t);
      const hasRelTF = relSet.has(t + "→" + f);
      const hasRel = isSelf ? relSet.has(f + "→" + f) : (hasRelFT || hasRelTF);
      if (isSelf && hasRel) { countSelfRef++; totalRel++; }
      else if (!isSelf && hasRel) {
        totalRel++;
        if (relRationale[key]) countWithRationale++;
        else countWithoutRationale++;
      }
    }

    <div class="matrix-health-card">
      <div class="mhc-num" style="color:#ef4444;">${countWithoutRationale}</div>

      <div class="mhc-num" style="color:var(--accent);">${totalRel}</div>
      <div class="mhc-label">総リレーション数</div>
    </div>
  </div>`;

  // Build matrix table
  html += `<div class="matrix-scroll"><table class="matrix-table"><thead><tr>`;
  html += `<th class="matrix-corner">From \\ To</th>`;
  for (const toId of dbOrder) {
    const layer = dbLayer(toId);
    const color = layerColor[layer] || "#888";
    const bg = layerBg[layer] || "#f8f9fc";
    html += `<th class="matrix-col-header" style="color:${color};background:${bg};" title="${toId} ${dbShort[toId]}">${toId.replace("DB","")}<br><span style="font-size:0.55rem;font-weight:400;">${dbShort[toId]}</span></th>`;
  }
  html += `</tr></thead><tbody>`;

  for (const fromId of dbOrder) {
    const fromLayer = dbLayer(fromId);
    const fromColor = layerColor[fromLayer] || "#888";
    const fromBg = layerBg[fromLayer] || "#f8f9fc";
    html += `<tr><td class="matrix-row-header" style="color:${fromColor};background:${fromBg};" title="${fromId} - ${dbShort[fromId]}">${fromId} <span style="font-weight:400;">${dbShort[fromId]}</span></td>`;
    for (const toId of dbOrder) {
      const isSelf = (fromId === toId);
      const hasRelFT = relSet.has(fromId + "→" + toId);
      const hasRelTF = relSet.has(toId + "→" + fromId);
      const hasRel = isSelf ? relSet.has(fromId + "→" + fromId) : (hasRelFT || hasRelTF);
      const key = matrixKey(fromId, toId);
      const hasRationale = !!relRationale[key];
      let cellClass = "matrix-cell no-rel";
      let emoji = "➖";
      if (isSelf && hasRel) { cellClass = "matrix-cell self-ref"; emoji = "🔄"; }
      else if (isSelf && !hasRel) { cellClass = "matrix-cell no-rel"; emoji = "—"; }
      else if (hasRel) {
        cellClass = "matrix-cell has-rel" + (!hasRationale ? " warn-rel" : "");
        emoji = "✅";
      }
      html += `<td class="${cellClass}" onclick="showMatrixDetail('${fromId}','${toId}')" title="${fromId}↔${toId}">${emoji}</td>`;
    }
    html += `</tr>`;
  }
  html += `</tbody></table></div>`;

  // Detail panel
  html += `<div class="matrix-detail" id="matrixDetailPanel">
    <div style="color:var(--text2);font-size:0.88rem;">セルをクリックすると詳細が表示されます。</div>
  </div>`;

  html += `</div>`;

  container.innerHTML = html;

  // Attach global handler
  window._matrixRationale = relRationale;
  window._matrixDbShort = dbShort;
  window._matrixLayerColor = layerColor;
  window._matrixLayerBg = layerBg;
  window._matrixRelSet = relSet;
  window._matrixDbLayer = dbLayer;
  window._matrixKey = matrixKey;
}

function showMatrixDetail(fromId, toId) {
  const panel = document.getElementById("matrixDetailPanel");
  if (!panel) return;
  const relSet = window._matrixRelSet;
  const relRationale = window._matrixRationale;
  const dbShort = window._matrixDbShort;
  const layerColor = window._matrixLayerColor;
  const layerBg = window._matrixLayerBg;
  const dbLayer = window._matrixDbLayer;
  const matrixKey = window._matrixKey;

  const isSelf = (fromId === toId);
  const hasRelFT = relSet.has(fromId + "→" + toId);
  const hasRelTF = relSet.has(toId + "→" + fromId);
  const hasRel = isSelf ? relSet.has(fromId + "→" + fromId) : (hasRelFT || hasRelTF);
  const key = matrixKey(fromId, toId);
  const info = relRationale[key];

  const fromLayer = dbLayer(fromId);
  const toLayer = dbLayer(toId);
  const fromColor = layerColor[fromLayer] || "#888";
  const toColor = layerColor[toLayer] || "#888";
  const fromBg = layerBg[fromLayer] || "#f5f5f5";
  const toBg = layerBg[toLayer] || "#f5f5f5";

  let statusEmoji, statusLabel, statusColor;
  if (isSelf && hasRel) {
    statusEmoji = "🔄"; statusLabel = "自己参照"; statusColor = "#3b82f6";
  } else if (hasRel) {
    statusEmoji = "✅"; statusLabel = "リレーションあり"; statusColor = "#22c55e";
  } else {
    statusEmoji = "➖"; statusLabel = "リレーションなし"; statusColor = "#9ca3af";
  }

  // Find actual relation labels
  const relLabels = [];
  for (const r of relations) {
    if (r.f === fromId && r.t === toId) relLabels.push(`${fromId}→${toId}: ${r.l}`);
    if (r.f === toId && r.t === fromId) relLabels.push(`${toId}→${fromId}: ${r.l}`);
  }

  const reasonHtml = info
    ? `<div class="md-reason">${info.reason}</div>`
    : (hasRel
        ? `<div class="md-reason" style="color:#ef4444;">⚠️ 根拠が未定義です。relRationale["${key}"] を追加してください。</div>`
        : `<div class="md-reason" style="color:var(--text2);">このペアにリレーションはありません。</div>`);

  const labelsHtml = relLabels.length
    ? `<div style="margin-top:10px;font-size:0.78rem;color:var(--text2);">リレーション: ${relLabels.map(l=>`<code style="background:#f1f5f9;padding:1px 6px;border-radius:4px;">${l}</code>`).join(" / ")}</div>`
    : "";

  panel.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <span class="md-status">${statusEmoji}</span>
      <span style="font-size:0.78rem;font-weight:700;color:${statusColor};">${statusLabel}</span>
      <span class="md-badge" style="background:${fromColor};">${fromId} ${dbShort[fromId]}</span>
      <span style="color:var(--text2);">↔</span>
      <span class="md-badge" style="background:${toColor};">${toId} ${dbShort[toId]}</span>
      <span style="font-size:0.72rem;color:var(--text2);margin-left:auto;">Key: ${key}</span>
    </div>
    ${reasonHtml}
    ${labelsHtml}
  `;
}

    <div style="background:#fefce8;border:1px solid #fef08a;border-radius:12px;padding:16px;text-align:center;">
      <div style="font-size:2rem;font-weight:800;color:#eab308;">${bySev.medium}</div>
      <div style="font-size:0.8rem;color:var(--text2);">Medium</div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;">
      <div style="font-size:1.2rem;font-weight:700;color:var(--text2);margin-top:4px;">${bySt.pending} 未着手</div>
      <div style="font-size:0.85rem;color:#f59e0b;font-weight:600;">${bySt.workaround} 回避策</div>
      <div style="font-size:0.85rem;color:#22c55e;font-weight:600;">${bySt.done} 完了</div>
    </div>
  </div>`;

  html += `<div class="critical-path-box">
    <h3>クリティカルパス（最長依存チェーン）</h3>
    <div class="critical-path-chain">
      <span class="critical-path-node">ISS-001<br><span style="font-size:0.68rem;font-weight:400;">People DB正規化→DB1-5</span></span>
      <span class="critical-path-arrow">&#10140;</span>
      <span class="critical-path-node">ISS-002<br><span style="font-size:0.68rem;font-weight:400;">Tasks/PJ移行→DB20-22</span></span>
      <span class="critical-path-arrow">/</span>
      <span class="critical-path-node">ISS-003<br><span style="font-size:0.68rem;font-weight:400;">市場データ投入</span></span>
    </div>
    <div class="critical-path-chain" style="margin-top:12px;">
      <span class="critical-path-node">ISS-005<br><span style="font-size:0.68rem;font-weight:400;">MCP接続</span></span>
      <span class="critical-path-arrow">&#10140;</span>
      <span class="critical-path-node">ISS-009/010<br><span style="font-size:0.68rem;font-weight:400;">Gmail/Slack→DB7</span></span>
      <span class="critical-path-arrow">&#10140;</span>
      <span class="critical-path-node">ISS-012<br><span style="font-size:0.68rem;font-weight:400;">統合ハブ(DB7)実現</span></span>
      <span class="critical-path-arrow">&#10140;</span>
      <span class="critical-path-node">ISS-020<br><span style="font-size:0.68rem;font-weight:400;">AIエージェント</span></span>
    </div>
    <p style="margin-top:12px;font-size:0.78rem;color:var(--text2);">上段: データ移行の依存チェーン / 下段: 自動化の依存チェーン</p>
  </div>`;

  const categories = {};
  for (const iss of issues) {
    if (!categories[iss.category]) categories[iss.category] = [];
    categories[iss.category].push(iss);
  }

  for (const [catName, catIssues] of Object.entries(categories)) {
    html += `<div class="issues-category-section"><h3>${catName} (${catIssues.length})</h3>`;
    for (const iss of catIssues) {
      const sevLabel = {critical:"CRITICAL",high:"HIGH",medium:"MEDIUM",low:"LOW"}[iss.severity];
      const stLabel = {pending:"未着手",workaround:"回避策あり",done:"完了"}[iss.status];
      const dbPillsHtml = iss.relatedDbs.map(id => {
        const db = dbById(id);
        const color = db ? getLayerColor(db.layer) : "#888";
        return `<span class="issue-db-pill" style="background:${color}">${id}</span>`;
      }).join("");
      const blockedByHtml = iss.blockedBy.length > 0
        ? `<div style="margin-top:6px;font-size:0.75rem;color:var(--text2);">Blocked by: <span class="issue-deps">${iss.blockedBy.map(id=>`<span class="issue-dep" onclick="scrollToIssue('${id}')">${id}</span>`).join("")}</span></div>` : '';
      const blocksHtml = iss.blocks.length > 0
        ? `<div style="margin-top:4px;font-size:0.75rem;color:var(--text2);">Blocks: <span class="issue-deps">${iss.blocks.map(id=>`<span class="issue-dep" onclick="scrollToIssue('${id}')">${id}</span>`).join("")}</span></div>` : '';

      html += `<div class="issue-card sev-${iss.severity}" id="issue-${iss.id}">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
          <span style="font-size:0.75rem;font-weight:700;color:var(--text2);">${iss.id}</span>
          <span class="sev-badge sev-${iss.severity}">${sevLabel}</span>
          <span class="status-badge st-${iss.status}">${stLabel}</span>
          ${dbPillsHtml ? `<span style="margin-left:auto;">${dbPillsHtml}</span>` : ''}
        </div>
        <div style="font-weight:700;font-size:0.92rem;margin-bottom:6px;">${iss.title}</div>
        <div style="font-size:0.82rem;color:var(--text2);line-height:1.6;margin-bottom:6px;">${iss.desc}</div>
        <div style="font-size:0.8rem;color:#ef4444;font-weight:600;">Impact: ${iss.impact}</div>
        ${blockedByHtml}${blocksHtml}
      </div>`;
    }
    html += `</div>`;
  }
  c.innerHTML = html;
}

function scrollToIssue(id) {
  const el = document.getElementById("issue-" + id);
  if (el) {
    el.scrollIntoView({behavior:"smooth", block:"center"});
    el.style.boxShadow = "0 0 0 3px var(--accent)";
    setTimeout(() => { el.style.boxShadow = ""; }, 2000);
  }
}
